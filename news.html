{% load static %}

<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'news/styles.css'%}">
    <title>News</title>

</head>

<body>
    <section>
        <nav class="relative navbar">
            <div class="max-w-7xl mx-auto px-4 flex items-center">
                <div id="logo" class="flex-shrink-0 ">
                    <a href="#">{{ user_code }}</a>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center py-5">
                        <div class="md:hidden">
                            <button id="menu-btn" class="text-white focus:outline-none cursor-pointer">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                        </div>

                        <ul id="menu"
                            class="hidden md:flex space-x-10 text-white text-xl lg:text-2xl  font-bold justify-center w-full">
                            <li><a href="{% url 'dashboard' %}" class="hover:text-white transition">PORTFOLIO</a></li>
                            <li><a href="#" class="hover:text-white transition">INCOMING REQUEST</a></li>
                            <li><form action="{% url 'logout' %}" method="post">
                                {% csrf_token %}
                                <button class="hover:text-white transition" style="color: white; font-size: 1.25rem;" type="submit">LOGOUT</button>
                                </form></li>

                        </ul>
                    </div>
                </div>
            </div>

            <div id="mobile-menu"
                class="md:hidden fixed inset-0 bg-black bg-opacity-100 text-#65B5EB text-2xl font-bold z-50 flex flex-col items-center justify-start pt-10 scale-0 transition-transform duration-500 ease-in-out">
                <button id="close-menu-btn" class="absolute top-5 right-5 text-white focus:outline-none cursor-pointer">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>

                <ul class="w-full">
                    <li class="border-b border-white w-full text-center py-4">
                        <a href="{% url 'dashboard' %}" class="hover:text-white transition">HOME</a>
                    </li>
                    <li class="first:mt-0 border-b border-white w-full text-center py-4">
                        <a href="#" class="hover:text-white transition">PORTFOLIO</a>
                    </li>
                    <li class="border-b border-white w-full text-center py-4">
                        <a href="#" class="hover:text-white transition">INCOMING REQUEST</a>
                    </li>
                    <li class="border-b border-white w-full text-center py-4">
                        <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="hover:text-white transition" style="color: white; font-size: 1.25rem;" type="submit">LOGOUT</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </section>
    <section class="news">
        {% for news_item in news %}
        <div class="max-w-sm mx-w-48 my-4 bg-white shadow-md rounded-lg p-4 space-y-2">
            <!-- Timing -->
            <div class="text-gray-500 text-sm">{{ news_item.time }}</div>

            <!-- Bold Header -->
            <div class="font-bold text-lg">{{ news_item.title }}</div>

            <!-- Small Paragraph -->
            <div class="text-gray-600 text-sm">
                {{ news_item.news_text }}
            </div>
        </div>
        {% endfor %}

    </section>
</body>
<script>
    const menuBtn = document.getElementById('menu-btn');
    const closeMenuBtn = document.getElementById('close-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    // Toggle the mobile menu visibility
    menuBtn.addEventListener('click', () => {
        mobileMenu.classList.add('show');
        menuBtn.classList.add('menu-btn-open');
    });

    // Close the mobile menu
    closeMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.remove('show');
        menuBtn.classList.remove('menu-btn-open');
    });

    // Optional: Close the menu when clicking outside of it
    document.addEventListener('click', (event) => {
        if (!mobileMenu.contains(event.target) && !menuBtn.contains(event.target)) {
            mobileMenu.classList.remove('show');
            menuBtn.classList.remove('menu-btn-open');
        }
    });
</script>

</html>
